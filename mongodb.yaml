- name: setup mongodb
  hosts: localhost
  connection: local
  become: yes

  tasks:
  - name: copy mongo Repository
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb package
    ansible.builtin.package:
      name: mongodb-org
      state: present

  - name: allow connections
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: ansible.builtin.service
    ansible.builtin.service:
      name: mongodb
      state: started
      enabled: true   