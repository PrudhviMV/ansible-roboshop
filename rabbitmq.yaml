- name: setup rabbitmq
  hosts: rabbitmq
  become: yes

  tasks:
  - name: install rabbitmq
    ansible.builtin.package:
      name: rabbitmq-server
      state: present

  - name: start and enable service
    ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: true

  - name: add user and set password
    community.rabbitmq.rabbitmq_user:
      user: joe
      password: changeme
      vhost: /
      configure_priv: .*
      read_priv: .*
      write_priv: .*
      state: present