- name: setup catalogue
  hosts: user
  become: yes

  tasks:
  - name: disable nodejs
    ansible.builtin.command: sudo dnf module disable nodejs -y

  - name: enable nodejs
    ansible.builtin.command: sudo dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: Add a new user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      shell: /sbin/nologin
      home: /app
      state: present

  - name: remove directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: fetch code from url
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  - name: unzip code
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
    
  - name: install npm
    community.general.npm:
      path: /app

  - name: copy user service file
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: reload and enable service
    ansible.builtin.service:
      name: user
      state: started
      enabled: true  